apply plugin: 'com.android.application'

android {
    namespace "com.quizapp.webview"
    compileSdkVersion 34
    
    configurations.all {
        resolutionStrategy.force 'androidx.core:core-ktx:1.9.0'
    }
    
    defaultConfig {
        applicationId "com.quizapp.webview"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 3
        versionName "3"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
}
